<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snapshot</title>
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">%F0%9F%A6%8B</text></svg>' />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* References page — standalone, different layout from the main table */
    body {
      background: #fafaf7;
    }
    #refs-app {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 32px 80px 32px;
    }
    #refs-header {
      border-bottom: 1px solid #e5e5e0;
      padding-bottom: 16px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    #refs-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }
    #refs-header a {
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }
    #refs-header a:hover {
      color: #000;
      text-decoration: underline;
    }
    #refs-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
      color: #666;
    }
    #refs-content {
      font-size: 14.5px;
      line-height: 1.6;
      color: #222;
    }
    #refs-content h1 { font-size: 22px; margin-top: 32px; }
    #refs-content h2 { font-size: 18px; margin-top: 28px; color: #333; }
    #refs-content h3 {
      font-size: 15px;
      margin-top: 24px;
      margin-bottom: 6px;
      color: #1a1a1a;
      font-weight: 600;
    }
    #refs-content hr {
      border: 0;
      border-top: 1px solid #e5e5e0;
      margin: 20px 0;
    }
    #refs-content a {
      color: var(--red-bright, #e63946);
      text-decoration: none;
    }
    #refs-content a:hover {
      text-decoration: underline;
    }
    #refs-content code {
      background: #f1f1ec;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 12.5px;
    }
    #refs-content blockquote {
      border-left: 3px solid #e5e5e0;
      margin: 12px 0;
      padding-left: 14px;
      color: #555;
    }
    .refs-error {
      padding: 20px;
      background: #fff3f0;
      border: 1px solid #f2c7bd;
      border-radius: 4px;
      color: #a03020;
    }
    .refs-loading {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <nav id="site-nav" aria-label="Site sections">
    <a href="index.html" class="brand-link"><span class="site-nav-brand">&nbsp;</span></a>
    <a href="./index.html" class="site-nav-link">A</a>
    <a href="./docs.html" class="site-nav-link">B</a>
    <a href="./references.html" class="site-nav-link active">C</a>
  </nav>

  <div id="refs-app">
    <header id="refs-header">
      <h1>&nbsp;</h1>
    </header>

    <div id="refs-content">
      <p class="refs-loading">Loading&hellip;</p>
    </div>
  </div>

  <!-- Shared decryption layer (generated by build-static.py) -->
  <script src="decrypt.js"></script>
  <!-- Vendored marked for markdown rendering -->
  <script src="marked.min.js"></script>
  <script>
    (function () {
      const contentEl = document.getElementById("refs-content");

      // Minimal configuration — the feed is plain markdown, no custom extensions needed.
      if (window.marked && typeof window.marked.setOptions === "function") {
        // breaks:true so single newlines render as <br>. The feed uses
        // consecutive Bold-Label lines (**Link:** / **Type:** / ...) that
        // should each sit on their own visual line.
        window.marked.setOptions({ gfm: true, breaks: true });
      }

      function renderRefs() {
        if (window.__DECRYPTED_DATA__) {
          var feed = window.__DECRYPTED_DATA__.references_md || {};
          var keys = Object.keys(feed);
          var md = (keys.length && feed[keys[0]]) || "_Not available._";
          var parser = (window.marked && window.marked.parse) || window.marked;
          contentEl.innerHTML = parser(md);

          contentEl.querySelectorAll("a[href^='http']").forEach(function (a) {
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener noreferrer");
          });
          return;
        }

        fetch("/api/references/feed")
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.text();
          })
          .then(function (md) {
            const parser = (window.marked && window.marked.parse) || window.marked;
            contentEl.innerHTML = parser(md);

            // Open external links in a new tab.
            const links = contentEl.querySelectorAll("a[href^='http']");
            links.forEach(function (a) {
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener noreferrer");
            });
          })
          .catch(function (err) {
            contentEl.innerHTML =
              '<div class="refs-error">Could not load references feed: ' +
              (err && err.message ? err.message : "unknown error") +
              "</div>";
          });
      }

      // Render immediately if data is ready; otherwise wait for decryption.
      if (window.__DECRYPTED_DATA__) {
        renderRefs();
      } else {
        document.addEventListener('data-decrypted', renderRefs);
      }
    })();
  </script>
</body>
</html>
